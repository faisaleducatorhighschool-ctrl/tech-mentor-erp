kind = "web"
previewPath = "/customer-app/"
title = "Smart Retail Store App"
version = "1.0.0"
id = "artifacts/customer-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/customer-app/" ]
localPort = 23710

[services.development]
run = "pnpm --filter @workspace/customer-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/customer-app", "run", "build" ]
publicDir = "artifacts/customer-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23710"
BASE_PATH = "/customer-app/"
