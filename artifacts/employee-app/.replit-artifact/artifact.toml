kind = "mobile"
previewPath = "/employee-app/"
title = "Tech Mentor Employee App"
version = "1.0.0"
id = "artifacts/employee-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/employee-app/" ]
localPort = 25991

[services.development]
run = "pnpm --filter @workspace/employee-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/employee-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/employee-app", "run", "serve" ]

[services.env]
PORT = "25991"
BASE_PATH = "/employee-app/"
